name: CI

# Keyless CI: no ANTHROPIC_API_KEY is ever set, so only offline paths run. The
# test job never loads a model (tests inject FakeEmbeddings); the smoke job builds
# the synthetic sample index and runs the keyless retrieval-only eval, then
# hard-asserts the result — a smoke test that cannot fail is worthless.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest tests/ -q

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      # Cache the ~90MB MiniLM download. The model name is fixed, so the key never
      # changes: after the first run every build reuses one frozen snapshot (which
      # also keeps the sample eval's floats stable across runs).
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2
      - name: Build the synthetic sample index
        run: python scripts/build_sample_index.py
      # Both --skip flags are required for a zero-generation, keyless run.
      - name: Keyless retrieval eval on the sample index
        run: >
          python -m src.pipeline eval
          --golden eval/sample_golden_set.jsonl
          --persist-dir sample_chroma_db
          --skip-refusals
          --skip-completeness
      # The eval CLI exits 0 regardless of hit rate, so assert the outcome here.
      # A non-canonical run (custom golden, no held-out set) writes the gitignored
      # eval/results_partial.md; grep the stable ASCII fragment of the headline.
      - name: Assert the sample eval scored 7/7
        run: grep -F "strict hit@6 = 7/7 = 1.000" eval/results_partial.md
