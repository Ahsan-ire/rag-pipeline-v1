name: CI

# Keyless CI: no ANTHROPIC_API_KEY is ever set, so only offline paths run. The
# test job never loads a model (tests inject FakeEmbeddings); the smoke job builds
# the synthetic sample index and runs the keyless retrieval-only eval, then
# hard-asserts the result — a smoke test that cannot fail is worthless.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest tests/ -q

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      # Cache the ~90MB MiniLM download. The model name is fixed, so the key never
      # changes: after the first run every build reuses one frozen snapshot (which
      # also keeps the sample eval's floats stable across runs).
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2
      - name: Build the synthetic sample index
        run: python scripts/build_sample_index.py
      # Both --skip flags are required for a zero-generation, keyless run.
      - name: Keyless retrieval eval on the sample index
        run: >
          python -m src.pipeline eval
          --golden eval/sample_golden_set.jsonl
          --persist-dir sample_chroma_db
          --skip-refusals
          --skip-completeness
      # The eval CLI exits 0 regardless of hit rate, so assert the outcome here.
      # A non-canonical run (custom golden, no held-out set) writes the gitignored
      # eval/results_partial.md; grep the stable ASCII fragment of the headline.
      - name: Assert the sample eval scored 7/7 (hybrid headline)
        run: grep -F "strict hit@6 = 7/7 = 1.000" eval/results_partial.md
      # Independently assert the BM25-only ablation row is a clean sweep. BM25 is
      # pure-Python and platform-deterministic, so this is safe to pin — and it
      # catches a missing/broken lexical sidecar that the hybrid headline could
      # otherwise mask (BM25 alone pins every sample question). The vector row is
      # intentionally NOT asserted: its floats vary across platforms (see D40).
      - name: Assert the BM25 arm is a clean sweep
        run: grep -E "^\| bm25 \| 1.000 \| 1.000 \| 1.000 \|" eval/results_partial.md
      # The fourth EVAL_MODES arm (Phase 13, D46). In keyless CI both --skip
      # flags disable query expansion, so this row is the disabled-expansion
      # fallback — equal to raw hybrid — and the grep only pins the row's
      # PRESENCE (that the arm renders), not its floats (which track hybrid's).
      - name: Assert the hybrid+rewrite ablation row renders
        run: grep -E "^\| hybrid\+rewrite \|" eval/results_partial.md
